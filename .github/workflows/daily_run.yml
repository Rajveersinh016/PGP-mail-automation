name: PGP Container Glass Intelligence — Daily Run

on:
  schedule:
    # 9:00 AM IST = 3:30 AM UTC (IST is UTC+5:30)
    - cron: '30 3 * * *'

  # Allow manual trigger from GitHub Actions UI
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'Run in debug mode (extra verbose logging)'
        required: false
        default: 'false'
        type: boolean

# Prevent overlapping runs — if a previous run is still in progress when the
# next schedule fires, the new run will wait (not cancel) the current one.
concurrency:
  group: daily-container-glass
  cancel-in-progress: false

jobs:
  intelligence-run:
    name: Daily Container Glass Intelligence Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 30 # Raised to 30 min to account for GitHub queue delay + pipeline

    # Required permission to commit processed_urls.json back to repo
    permissions:
      contents: write

    steps:
      # ── Step 1: Checkout repository ──────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 2: Print Timing Info (before pipeline) ───────────────────────
      - name: Print Run Timing Info
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "  PGP Glass Intelligence — Run Timing Diagnostics"
          echo "════════════════════════════════════════════════════════"
          echo ""
          echo "  Scheduled cron   : 30 3 * * *  (3:30 AM UTC = 9:00 AM IST)"
          echo "  Run created at   : ${{ github.run_created_at }}"
          echo "  Current UTC time : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Current IST time : $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M:%S IST')"
          echo ""
          echo "  NOTE: GitHub-hosted runners do not guarantee exact cron"
          echo "  timing. Delays of 30 min to several hours are normal"
          echo "  under high load. For exact 9:00 AM IST delivery, use a"
          echo "  dedicated VPS or self-hosted runner instead."
          echo "════════════════════════════════════════════════════════"

      # ── Step 3: Set up Python ────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      # ── Step 4: Install dependencies ─────────────────────────────────────
      - name: Install Python Dependencies
        run: pip install -r requirements.txt

      # ── Step 5: Run intelligence pipeline ───────────────────────────────
      - name: Run Container Glass Intelligence Pipeline
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENTS: ${{ secrets.RECIPIENTS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Pass GitHub run metadata into Python for queue-delay calculation
          GITHUB_RUN_CREATED_AT: ${{ github.run_created_at }}
        run: python main.py

      # ── Step 6: Print Finish Timestamp ────────────────────────────────────
      - name: Print Finish Timestamp
        if: always()
        run: |
          echo "════════════════════════════════════════════════════════"
          echo "  Pipeline finished"
          echo "  Finish UTC time  : $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "  Finish IST time  : $(TZ='Asia/Kolkata' date '+%Y-%m-%d %H:%M:%S IST')"
          echo "════════════════════════════════════════════════════════"

      # ── Step 7: Commit updated state files ───────────────────────────────
      - name: Commit Updated State Files
        if: always()
        run: |
          git config --global user.name "PGP Glass Intelligence Bot"
          git config --global user.email "pgp-glass-bot@noreply.github.com"
          git add processed_urls.json data/sources.json data/potential_sources.json || true
          # Only commit if there's an actual change
          git diff --staged --quiet || git commit -m "chore: update state files [$(date -u '+%Y-%m-%d')] [skip ci]"
          git push || echo "⚠ Git push failed (likely due to concurrent run push or git lock). The workflow continues without crashing."
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 8: Upload execution logs as artifacts ──────────────────────
      - name: Upload Run Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: execution-logs
          path: logs/
          retention-days: 7
